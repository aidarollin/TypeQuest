<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TypeQuest</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <link rel="stylesheet" href="taskpane.css" />
</head>
<body>

<!-- Sign-in view -->
<div id="view-signin">
  <div class="brand">
    <div class="brand-mark">TQ</div>
    <div class="brand-name">TypeQuest</div>
  </div>
  <div class="card">
    <div class="card-title">Connect your account</div>
    <p class="muted">Generate a Personal Access Token in the TypeQuest dashboard (Settings page) and paste it below.</p>
    <input
      id="token-input"
      type="text"
      class="input"
      placeholder="tq_eyJ…"
      autocomplete="off"
      spellcheck="false"
    />
    <button id="signin-btn" class="btn btn-primary">Connect</button>
    <div id="signin-err" class="error" hidden></div>
  </div>
</div>

<!-- Loading view -->
<div id="view-loading" hidden>
  <div class="centered muted">Connecting…</div>
</div>

<!-- Stats view -->
<div id="view-stats" hidden>
  <div class="brand">
    <div class="brand-mark">TQ</div>
    <div class="brand-name">TypeQuest</div>
  </div>

  <!-- Level + XP -->
  <div class="card">
    <div class="card-title">Progress</div>
    <div class="level-row">
      <div class="level-num" id="level">—</div>
      <div>
        <div class="level-title" id="level-title">Apprentice Scribe</div>
        <div class="muted small">→ Level <span id="next-level">2</span></div>
      </div>
    </div>
    <div class="xpbar">
      <div class="xpbar-fill" id="xp-fill" style="width:0%"></div>
    </div>
    <div class="xp-label muted small"><span id="xp-in">0</span> / <span id="xp-next">50</span> XP</div>
  </div>

  <!-- Today + Session -->
  <div class="card">
    <div class="card-title">Today</div>
    <div class="stat-row"><span class="stat-label">Words</span><span class="stat-value accent" id="today-words">0</span></div>
    <div class="stat-row"><span class="stat-label">Active time</span><span class="stat-value" id="today-time">0m</span></div>
    <div class="stat-row"><span class="stat-label">Streak</span><span class="stat-value">🔥 <span id="streak-days">0</span> days</span></div>
  </div>

  <div class="card">
    <div class="card-title">This session</div>
    <div class="stat-row"><span class="stat-label">Words</span><span class="stat-value" id="session-words">0</span></div>
    <div class="stat-row"><span class="stat-label">Time</span><span class="stat-value" id="session-time">0m</span></div>
  </div>

  <div class="card">
    <div class="card-title">All-time</div>
    <div class="stat-row"><span class="stat-label">Words</span><span class="stat-value" id="lifetime-words">0</span></div>
    <div class="stat-row"><span class="stat-label">Time</span><span class="stat-value" id="lifetime-time">0m</span></div>
  </div>

  <!-- Badge unlock area -->
  <div id="recent-unlocks"></div>

  <div class="centered" style="margin-top:8px">
    <button id="signout-btn" class="btn btn-ghost">Sign out</button>
  </div>
</div>

</body>
</html>
